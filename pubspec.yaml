name: optombai
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  carousel_slider: ^5.0.0
  # OTP input with native SMS autofill (iOS oneTimeCode suggestion bar +
  # Android Smart Auth without app-hash). Used via the OtpCodeField wrapper.
  pinput: ^5.0.0
  # Android SMS auto-read (User Consent API, no app-hash) for OtpCodeField.
  # 2.x API matches pinput 5.x's documented SmsRetriever example.
  smart_auth: ^2.0.0
  dio: ^5.3.4
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  get_it: ^9.0.0
  card_swiper: ^3.0.1
  easy_image_viewer: ^1.2.1
  image_picker: ^1.1.2
  image_cropper: ^8.1.0
  path_provider: ^2.0.15
  star_menu: ^4.0.1
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  flutter_spinkit: ^5.2.0
  share_plus: ^12.0.0
  provider: ^6.1.2
  url_launcher: ^6.3.1
  intl: 0.20.2
  flutter_speed_dial: ^7.0.0
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.2
  async: ^2.11.0
  path: ^1.9.0
  #  firebase_core: ^2.24.2
  #  firebase_auth: ^4.17.4
  intl_phone_field: ^3.2.0
  animated_tree_view: ^2.2.0
  permission_handler: ^11.3.1
  flutter_dotenv: ^6.0.0
  webview_flutter: ^4.10.0

  meta: any
  firebase_core: ^3.11.0
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.4.0
  collection: ^1.18.0
  translator: ^1.0.3+1
  dropdown_button2: ^2.3.9
  firebase_database: ^11.3.7
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^17.2.4
  flutter_screenutil: ^5.9.3
  app_links: ^6.4.0
  flutter_launcher_icons: ^0.14.4
  image_gallery_saver_plus2: ^4.0.3
  file_picker: ^8.1.0
  package_info_plus: ^8.1.2

  flutter_paybox_2:
    path: flutter_paybox_2
  finik_sdk: ^3.1.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_webrtc: 1.4.1
  web_socket_channel: ^3.0.3
  uuid: ^4.5.1
  http: ^1.6.0
  shimmer: ^3.0.0
  video_player: ^2.9.2
  media_kit: ^1.2.6
  media_kit_video: ^2.0.0
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_ios_video: ^1.1.4
  dart_jsonwebtoken: ^3.3.1
  in_app_purchase: ^3.2.3
  in_app_purchase_storekit: ^0.4.4
  flutter_image_compress: ^2.4.0
  dio_cache_interceptor: ^3.5.0
  talker_flutter: ^5.1.16
  talker_dio_logger: ^5.1.16
  visibility_detector: ^0.4.0+2
  video_thumbnail: ^0.5.3
  video_compress: ^3.1.4
  auto_route: ">=10.0.0 <10.2.0"
  showcaseview: ^5.0.1
  connectivity_plus: ^6.1.4
  font_awesome_flutter: ^11.0.0
#  image_gallery_saver_plus2: ^4.0.3
#  uni_links: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  auto_route_generator: any
  mocktail: ^0.3.0

flutter_launcher_icons:
  ios: true
  android: true

  # iOS
  image_path_ios: "assets/logo_bazarlar.png"
  remove_alpha_ios: true

  # Android (adaptive)
  image_path_android: "assets/logo_bazarlar.png"
  android_adaptive_icon_background: "#ffffff"
  android_adaptive_icon_foreground: "assets/pro2.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/slider/
    - assets/flags/
    - assets/types/
    - assets/icons/
    - assets/onboarding/
    - assets/icons/drawer_icons/
    - assets/icons/socials/
    - assets/icons/socials_dark/
    - assets/fonts/
    - assets/gold/
    - assets/cards/
    - assets/banners/
    - assets/maps/
    - .env

  fonts:
    - family: OpenSauce
      fonts:
        - asset: assets/fonts/OpenSauceSans-Regular.ttf
        - asset: assets/fonts/OpenSauceOne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/OpenSauceOne-Bold.ttf
          weight: 700

    - family: LibraSerifModern
      fonts:
        - asset: assets/fonts/LibraSerifModern-Regular.otf
        - asset: assets/fonts/LibraSerifModern-Bold.otf
          weight: 700
